<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Confirm your signup</title>
  <!--[if gte mso 9]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
  <style>
    @media only screen and (max-width: 620px) {
      .email-container { width: 100% !important; }
      .stack-cell { padding-left: 24px !important; padding-right: 24px !important; }
      .heading { font-size: 32px !important; line-height: 38px !important; }
      .body-text { font-size: 17px !important; line-height: 22px !important; }
      .small-text { font-size: 14px !important; }
      .cta-btn { padding: 14px 36px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #FEFEFB; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #FEFEFB;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" class="email-container" style="max-width: 600px; width: 100%; background-color: #FEFEFB;">

          <!-- LOGO: Replace https://olyaabra.github.io/geolava-email-assets/invited/logo-resized.png with your hosted logo URL -->
          <tr>
            <td class="stack-cell" style="padding: 40px 40px 16px 40px;">
              <img src="https://olyaabra.github.io/geolava-email-assets/invited/logo-resized.png" alt="Geolava" width="92" height="23" style="display: block; border: 0; outline: none; text-decoration: none; width: 92px; height: 23px;" />
            </td>
          </tr>

          <!-- HEADING + BODY -->
          <tr>
            <td class="stack-cell" style="padding: 120px 40px 32px 40px;">
              <h1 class="heading" style="margin: 0 0 24px 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 48px; font-weight: 200; color: #282823; line-height: 52px; letter-spacing: -0.96px;">Confirm your signup</h1>
              <p class="body-text" style="margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 300; color: #282823; line-height: 24px;">Follow this link to verify your email address.</p>
            </td>
          </tr>

          <!-- CTA BUTTON -->
          <tr>
            <td class="stack-cell" style="padding: 0 40px 32px 40px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="background-color: #6266E6; border-radius: 60px;">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://app.geolava.com/confirm" style="height:48px;v-text-anchor:middle;width:260px;" arcsize="50%" strokecolor="#6266E6" fillcolor="#6266E6">
                      <w:anchorlock/>
                      <center style="color:#FEFEFB;font-family:Arial,sans-serif;font-size:12px;font-weight:bold;letter-spacing:1.32px;">CONFIRM YOUR MAIL</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="https://app.geolava.com/confirm" target="_blank" class="cta-btn" style="display: inline-block; padding: 16px 50px; background-color: #6266E6; color: #FEFEFB; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.32px; text-transform: uppercase; text-decoration: none; border-radius: 60px; line-height: 16px;">Confirm your mail</a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- SMALL TEXT -->
          <tr>
            <td class="stack-cell" style="padding: 32px 40px 40px 40px;">
              <p class="small-text" style="margin: 0 0 0 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 300; color: #282823; line-height: 24px;">If you didn't ask to verify this address, you can ignore this email.</p>
              <p class="small-text" style="margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 300; color: #282823; line-height: 24px;">Your project -147726698608 team</p>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding: 40px;" align="center">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding-bottom: 16px;">
                    <a href="{{unsubscribe_url}}" style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; color: #939391; text-decoration: underline; text-transform: uppercase; letter-spacing: 1.43px; font-weight: 700;">Unsubscribe</a>
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <p style="margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 400; color: #AAAAAA; line-height: normal;">&copy;Geolava, 2026</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
