<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geolava Email Templates</title>
  <style>
    body { font-family: Inter, -apple-system, sans-serif; background: #FEFEFB; color: #282823; margin: 0; padding: 40px 20px; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-weight: 200; font-size: 32px; margin-bottom: 8px; }
    p { color: #4D4D4B; font-size: 16px; line-height: 24px; }
    .cards { display: flex; flex-direction: column; gap: 16px; margin-top: 32px; }
    a.card { display: block; padding: 20px 24px; background: #fff; border: 1px solid #DFDFDE; border-radius: 12px; text-decoration: none; color: #282823; transition: border-color 0.2s; }
    a.card:hover { border-color: #6266E6; }
    .card-title { font-weight: 600; font-size: 18px; margin-bottom: 4px; }
    .card-desc { font-size: 14px; color: #939391; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Geolava Emails</h1>
    <p>Click to preview each email template. Copy the HTML source to paste into Intercom.</p>
    <div class="cards">
      <a class="card" href="welcome/welcome-intercom.html">
        <div class="card-title">Welcome</div>
        <div class="card-desc">Onboarding email with hero image, checklist, and CTA</div>
      </a>
      <a class="card" href="invited/invited-intercom.html">
        <div class="card-title">Invited</div>
        <div class="card-desc">Signup confirmation email</div>
      </a>
      <a class="card" href="analysis-ready/analysis-ready-intercom.html">
        <div class="card-title">Analysis is Ready</div>
        <div class="card-desc">Notification with hero illustration and analysis link</div>
      </a>
    </div>
  </div>
</body>
</html>
